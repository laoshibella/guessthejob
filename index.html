<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Guess the Job - Interactive</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; margin: 0; background: #eef2f3; }
        #left { width: 40%; padding: 50px; display: flex; flex-direction: column; justify-content: center; }
        #right { width: 60%; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); background: #333; gap: 2px; border: 5px solid white; }
        .tile { background-color: #555; background-size: 300% 300%; background-repeat: no-repeat; border: 1px solid #000; transition: background 0.3s; }
        .hidden { background-color: #555; background-image: none !important; }
        button { padding: 15px 30px; font-size: 20px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 8px; margin-top: 20px; }
        h1 { color: #2c3e50; }
        .clue-box { font-size: 24px; font-weight: bold; color: #34495e; min-height: 120px; }
    </style>
</head>
<body>

<div id="left">
    <h1 id="job-title">Guess the Job!</h1>
    <div class="clue-box" id="clue-text">Press Start to begin!</div>
    <div id="progress">Job 1 of 20</div>
    <button id="action-btn" onclick="nextStep()">Start Game</button>
</div>

<div id="right">
    <div class="tile hidden" id="t0"></div><div class="tile hidden" id="t1"></div><div class="tile hidden" id="t2"></div>
    <div class="tile hidden" id="t3"></div><div class="tile hidden" id="t4"></div><div class="tile hidden" id="t5"></div>
    <div class="tile hidden" id="t6"></div><div class="tile hidden" id="t7"></div><div class="tile hidden" id="t8"></div>
</div>

<script>
    const jobs = [
        { name: "Teacher", img: "https://source.unsplash.com/600x400/?teacher", clues: ["I work in a school.", "I use a whiteboard.", "I work with other teachers.", "I help students learn.", "My main job is to teach."] },
        { name: "Doctor", img: "https://source.unsplash.com/600x400/?doctor", clues: ["I work in a hospital.", "I use a stethoscope.", "I work with nurses.", "I help sick people.", "My main job is to help people heal."] },
        { name: "Chef", img: "https://source.unsplash.com/600x400/?chef", clues: ["I work in a kitchen.", "I use a frying pan.", "I work with waiters.", "I help hungry people.", "My main job is to cook food."] },
        { name: "Police Officer", img: "https://source.unsplash.com/600x400/?police", clues: ["I work on the street.", "I use a shiny badge.", "I work with other officers.", "I help in dangerous times.", "My main job is to keep people safe."] },
        { name: "Firefighter", img: "https://source.unsplash.com/600x400/?firefighter", clues: ["I work at a fire station.", "I use a water hose.", "I work with a rescue team.", "I help people in fires.", "My main job is to stop fires."] },
        { name: "Pilot", img: "https://source.unsplash.com/600x400/?pilot", clues: ["I work in an airplane.", "I use buttons and levers.", "I work with flight crew.", "I help passengers travel.", "My main job is to fly the plane."] },
        { name: "Librarian", img: "https://source.unsplash.com/600x400/?librarian", clues: ["I work in a library.", "I use many books.", "I work with library staff.", "I help people find stories.", "My main job is to organize books."] },
        { name: "Dentist", img: "https://source.unsplash.com/600x400/?dentist", clues: ["I work in a clinic.", "I use a small mirror.", "I work with nurses.", "I help with toothaches.", "My main job is to clean teeth."] },
        { name: "Farmer", img: "https://source.unsplash.com/600x400/?farmer", clues: ["I work on a farm.", "I use a big tractor.", "I work with farm animals.", "I help feed families.", "My main job is to grow food."] },
        { name: "Hairdresser", img: "https://source.unsplash.com/600x400/?hairdresser", clues: ["I work in a salon.", "I use sharp scissors.", "I work with other stylists.", "I help you look good.", "My main job is to cut hair."] },
        { name: "Photographer", img: "https://source.unsplash.com/600x400/?photographer", clues: ["I work in a studio.", "I use a camera.", "I work with models.", "I help save memories.", "My main job is to take photos."] },
        { name: "Veterinarian", img: "https://source.unsplash.com/600x400/?veterinarian", clues: ["I work in an animal clinic.", "I use animal medicine.", "I work with assistants.", "I help sick pets.", "My main job is to care for animals."] },
        { name: "Baker", img: "https://source.unsplash.com/600x400/?baker", clues: ["I work in a bakery.", "I use a big oven.", "I work with shop staff.", "I help hungry people.", "My main job is to bake bread."] },
        { name: "Bus Driver", img: "https://source.unsplash.com/600x400/?bus-driver", clues: ["I work on the road.", "I use a big bus.", "I work with passengers.", "I help you travel.", "My main job is to drive the bus."] },
        { name: "Mail Carrier", img: "https://source.unsplash.com/600x400/?mail-carrier", clues: ["I walk in neighborhoods.", "I use a heavy bag.", "I work at the post office.", "I help you get letters.", "My main job is to deliver mail."] },
        { name: "Artist", img: "https://source.unsplash.com/600x400/?artist", clues: ["I work in a studio.", "I use a paintbrush.", "I work with galleries.", "I help people enjoy art.", "My main job is to paint."] },
        { name: "Mechanic", img: "https://source.unsplash.com/600x400/?mechanic", clues: ["I work in a garage.", "I use a heavy wrench.", "I work with tools.", "I help people with cars.", "My main job is to fix cars."] },
        { name: "Nurse", img: "https://source.unsplash.com/600x400/?nurse", clues: ["I work in a hospital.", "I use a thermometer.", "I work with doctors.", "I help sick patients.", "My main job is to care for you."] },
        { name: "Scientist", img: "https://source.unsplash.com/600x400/?scientist", clues: ["I work in a lab.", "I use test tubes.", "I work with researchers.", "I help answer questions.", "My main job is to do experiments."] },
        { name: "Singer", img: "https://source.unsplash.com/600x400/?singer", clues: ["I work on a stage.", "I use a microphone.", "I work with a band.", "I help people feel happy.", "My main job is to sing songs."] }
    ];

    let jobIndex = 0;
    let step = 0;
    const revealOrder = [4, 1, 7, 3, 5, 0, 2, 6, 8];

    function nextStep() {
        const btn = document.getElementById('action-btn');
        if (step < 5) {
            document.getElementById('clue-text').innerText = jobs[jobIndex].clues[step];
            // Reveal a tile
            let tile = document.getElementById('t' + revealOrder[step]);
            tile.classList.remove('hidden');
            tile.style.backgroundImage = `url(${jobs[jobIndex].img})`;
            tile.style.backgroundPosition = (revealOrder[step] % 3 * 50) + "% " + (Math.floor(revealOrder[step] / 3) * 50) + "%";
            step++;
            btn.innerText = "Next Clue";
        } else {
            // Reveal all
            document.querySelectorAll('.tile').forEach((t, i) => {
                t.classList.remove('hidden');
                t.style.backgroundImage = `url(${jobs[jobIndex].img})`;
                t.style.backgroundPosition = (i % 3 * 50) + "% " + (Math.floor(i / 3) * 50) + "%";
            });
            document.getElementById('clue-text').innerHTML = `<strong>IT IS A: ${jobs[jobIndex].name}!</strong>`;
            btn.innerText = "Next Job";
            step = 0;
            jobIndex = (jobIndex + 1) % jobs.length;
            document.getElementById('progress').innerText = `Job ${jobIndex === 0 ? 20 : jobIndex} of 20`;
        }
    }
</script>
</body>
</html>

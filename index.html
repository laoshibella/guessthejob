<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Guess the Job - Detective Edition</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; margin: 0; background: #eef2f3; overflow: hidden; }
        #left { width: 40%; padding: 40px; display: flex; flex-direction: column; justify-content: center; }
        #detective-img { width: 100px; margin-bottom: 10px; }
        h1 { color: #2c3e50; font-size: 35px; margin: 0; }
        .clue-box { font-size: 32px; font-weight: bold; color: #34495e; min-height: 180px; margin: 20px 0; }
        #progress { font-size: 20px; color: #555; font-weight: bold; }
        button { padding: 15px 30px; font-size: 22px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 10px; }
        
        #right { width: 60%; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); background: #333; gap: 2px; border: 5px solid white; }
        .tile { background-color: #2c3e50; background-size: 300% 300%; border: 1px solid #000; }
        .hidden { background-image: none !important; background-color: #555 !important; }
    </style>
</head>
<body>

<div id="left">
    <img id="detective-img" src="https://cdn-icons-png.flaticon.com/512/2921/2921225.png" alt="Detective">
    <h1 id="job-title">Guess the Job!</h1>
    <div class="clue-box" id="clue-text">Ready for the mystery?</div>
    <div id="progress">Job 1 of 18</div>
    <button id="action-btn" onclick="gameLogic()">Start Game</button>
</div>

<div id="right">
    <div class="tile hidden" id="t0" style="background-position: 0% 0%;"></div>
    <div class="tile hidden" id="t1" style="background-position: 50% 0%;"></div>
    <div class="tile hidden" id="t2" style="background-position: 100% 0%;"></div>
    <div class="tile hidden" id="t3" style="background-position: 0% 50%;"></div>
    <div class="tile hidden" id="t4" style="background-position: 50% 50%;"></div>
    <div class="tile hidden" id="t5" style="background-position: 100% 50%;"></div>
    <div class="tile hidden" id="t6" style="background-position: 0% 100%;"></div>
    <div class="tile hidden" id="t7" style="background-position: 50% 100%;"></div>
    <div class="tile hidden" id="t8" style="background-position: 100% 100%;"></div>
</div>

<script>
    const jobs = [
        { name: "Singer", img: "singer.jpg", clues: ["I perform for a crowd.", "I use a microphone.", "I stand on a stage.", "I sing songs for my fans.", "I love to perform music."] },
        { name: "Scientist", img: "scientist.jpg", clues: ["I work in a lab.", "I use a microscope.", "I do experiments.", "I search for new discoveries.", "I study science."] },
        { name: "Nurse", img: "nurse.jpg", clues: ["I work in a hospital.", "I wear scrubs.", "I help take care of sick patients.", "I use a stethoscope.", "I help people feel better."] },
        { name: "Mechanic", img: "mechanic.jpg", clues: ["I work in a garage.", "I use heavy wrenches.", "I fix cars.", "I work on engines.", "I help people when their car breaks down."] },
        { name: "Artist", img: "artist.jpg", clues: ["I work in a studio.", "I use brushes and paint.", "I create beautiful pictures.", "I use an easel.", "I am very creative."] },
        { name: "Postman", img: "postman.jpg", clues: ["I walk through neighborhoods.", "I carry a big bag.", "I deliver letters and packages.", "I visit many houses every day.", "I bring people their mail."] },
        { name: "Bus Driver", img: "busdriver.jpg", clues: ["I drive a large vehicle.", "I follow a specific route.", "I help people get to work or school.", "I sit in the driver's seat.", "I pick up passengers."] },
        { name: "Baker", img: "baker.jpg", clues: ["I work in a bakery.", "I use an oven.", "I make delicious bread.", "I am covered in flour.", "I bake sweet treats."] },
        { name: "Veterinarian", img: "veterinarian.jpg", clues: ["I work in a clinic.", "I take care of animals.", "I help sick pets.", "I check if animals are healthy.", "I love helping all kinds of creatures."] },
        { name: "Photographer", img: "photographer.jpg", clues: ["I work in a studio.", "I use a professional camera.", "I take many pictures.", "I use bright lights.", "I help capture memories."] },
        { name: "Hairdresser", img: "hairdresser.jpg", clues: ["I work in a salon.", "I use sharp scissors.", "I help you look good.", "I use a hair dryer.", "I style people's hair."] },
        { name: "Farmer", img: "farmer.jpg", clues: ["I work on a farm.", "I grow crops.", "I drive a tractor.", "I love the outdoors.", "I help produce food."] },
        { name: "Pilot", img: "pilot.jpg", clues: ["I work in an airplane.", "I sit in a cockpit.", "I fly long distances.", "I look at many instruments.", "I make sure passengers arrive safely."] },
        { name: "Firefighter", img: "firefighter.jpg", clues: ["I work at a fire station.", "I wear a special helmet.", "I use a fire hose.", "I rush to emergencies.", "I help stop fires."] },
        { name: "Police Officer", img: "police.jpg", clues: ["I work on patrol.", "I have a shiny badge.", "I drive a police car.", "I keep my city safe.", "I follow the law."] },
        { name: "Chef", img: "chef.jpg", clues: ["I work in a restaurant.", "I wear a tall white hat.", "I cook delicious meals.", "I use pots and pans.", "I love making new recipes."] },
        { name: "Doctor", img: "doctor.jpg", clues: ["I work in a hospital.", "I wear a white coat.", "I use a stethoscope.", "I help diagnose illnesses.", "I help people live healthier lives."] },
        { name: "Teacher", img: "teacher.jpg", clues: ["I work in a classroom.", "I write on a chalkboard.", "I explain new topics.", "I help students learn.", "I inspire young minds."] }
    ];

    let jobIndex = 0;
    let step = -1;
    const revealOrder = [0, 1, 2, 3, 4, 5, 6, 7, 8].sort(() => Math.random() - 0.5);

    function gameLogic() {
        const btn = document.getElementById('action-btn');
        if (step === -1) {
            step = 0;
            document.getElementById('clue-text').innerText = jobs[jobIndex].clues[step];
            btn.innerText = "Next Clue";
            document.getElementById('progress').innerText = `Job ${jobIndex + 1} of ${jobs.length}`;
            return;
        }
        if (step < 5) {
            document.getElementById('clue-text').innerText = jobs[jobIndex].clues[step];
            let tile = document.getElementById('t' + revealOrder[step]);
            tile.classList.remove('hidden');
            tile.style.backgroundImage = `url('${jobs[jobIndex].img}')`;
            step++;
            if (step === 5) btn.innerText = "Reveal Answer";
        } else if (step === 5) {
            document.querySelectorAll('.tile').forEach(t => {
                t.classList.remove('hidden');
                t.style.backgroundImage = `url('${jobs[jobIndex].img}')`;
            });
            document.getElementById('clue-text').innerHTML = `<strong>IT IS A: ${jobs[jobIndex].name}!</strong>`;
            btn.innerText = "Next Job";
            step = 6;
        } else {
            document.querySelectorAll('.tile').forEach(t => {
                t.classList.add('hidden');
                t.style.backgroundImage = 'none';
            });
            jobIndex = (jobIndex + 1) % jobs.length;
            step = -1;
            document.getElementById('clue-text').innerText = "Ready for the next mystery?";
            btn.innerText = "Start Next Job";
        }
    }
</script>
</body>
</html>

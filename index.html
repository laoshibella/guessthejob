<script>
    const jobs = [ /* ... your existing job array ... */ ];
    let jobIndex = 0;
    let step = 0;

    // Initialize the first job's image silently
    document.getElementById('job-img').src = jobs[0].img;

    function nextStep() {
        const btn = document.getElementById('action-btn');
        const img = document.getElementById('job-img');
        const clueText = document.getElementById('clue-text');

        if (step < 5) {
            clueText.innerText = jobs[jobIndex].clues[step];
            // Gradually reduce blur from 20px to 0px
            img.style.filter = `blur(${20 - (step * 4)}px)`;
            step++;
            btn.innerText = "Next Clue";
        } else {
            clueText.innerHTML = `<strong>IT IS A: ${jobs[jobIndex].name}!</strong>`;
            img.className = 'visible';
            btn.innerText = "Next Job";
            
            // Prepare for next
            step = 0;
            jobIndex = (jobIndex + 1) % jobs.length;
            document.getElementById('progress').innerText = `Job ${jobIndex === 0 ? 20 : jobIndex} of 20`;
            
            // Set up image for the next round without showing it yet
            img.src = jobs[jobIndex].img;
            img.className = 'hidden';
            img.style.filter = 'blur(20px)';
        }
    }
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Guess the Job - Detective Edition</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; margin: 0; background: #eef2f3; overflow: hidden; }
        #left { width: 40%; padding: 40px; display: flex; flex-direction: column; justify-content: center; }
        #detective-img { width: 100px; margin-bottom: 10px; }
        h1 { color: #2c3e50; font-size: 35px; margin: 0; }
        .clue-box { font-size: 32px; font-weight: bold; color: #34495e; min-height: 180px; margin: 20px 0; }
        #progress { font-size: 20px; color: #555; font-weight: bold; }
        button { padding: 15px 30px; font-size: 22px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 10px; transition: 0.2s; }
        button:hover { background: #218838; }
        
        #right { width: 60%; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); background: #333; gap: 2px; border: 5px solid white; }
        /* Added a background color fallback if images take time to load */
        .tile { background-color: #2c3e50; background-size: 300% 300%; border: 1px solid #000; transition: background 0.3s; }
        .hidden { background-image: none !important; background-color: #555 !important; }
    </style>
</head>
<body>

<div id="left">
    <img id="detective-img" src="https://cdn-icons-png.flaticon.com/512/2921/2921225.png" alt="Detective">
    <h1 id="job-title">Guess the Job!</h1>
    <div class="clue-box" id="clue-text">Ready for the next mystery?</div>
    <div id="progress">Job 1 of 20</div>
    <button id="action-btn" onclick="gameLogic()">Start Game</button>
</div>

<div id="right">
    <div class="tile hidden" id="t0" style="background-position: 0% 0%;"></div>
    <div class="tile hidden" id="t1" style="background-position: 50% 0%;"></div>
    <div class="tile hidden" id="t2" style="background-position: 100% 0%;"></div>
    <div class="tile hidden" id="t3" style="background-position: 0% 50%;"></div>
    <div class="tile hidden" id="t4" style="background-position: 50% 50%;"></div>
    <div class="tile hidden" id="t5" style="background-position: 100% 50%;"></div>
    <div class="tile hidden" id="t6" style="background-position: 0% 100%;"></div>
    <div class="tile hidden" id="t7" style="background-position: 50% 100%;"></div>
    <div class="tile hidden" id="t8" style="background-position: 100% 100%;"></div>
</div>

<script>
    // Using a reliable keyword-based image service
    const jobs = [
        { name: "Teacher", term: "teacher", clues: ["I work in a school.", "I use a whiteboard.", "I work with other teachers.", "I help students learn.", "My main job is to teach."] },
        { name: "Doctor", term: "doctor", clues: ["I work in a hospital.", "I use a stethoscope.", "I work with nurses.", "I help sick people.", "My main job is to help people heal."] },
        { name: "Chef", term: "chef", clues: ["I work in a kitchen.", "I use a frying pan.", "I work with waiters.", "I help hungry people.", "My main job is to cook food."] },
        { name: "Police Officer", term: "police", clues: ["I work on the street.", "I use a shiny badge.", "I work with other officers.", "I help in dangerous times.", "My main job is to keep people safe."] },
        { name: "Firefighter", term: "firefighter", clues: ["I work at a fire station.", "I use a water hose.", "I work with a rescue team.", "I help people in fires.", "My main job is to stop fires."] },
        { name: "Pilot", term: "airplane", clues: ["I work in an airplane.", "I use buttons and levers.", "I work with flight crew.", "I help passengers travel.", "My main job is to fly the plane."] },
        { name: "Waiter", term: "waiter", clues: ["I work in a restaurant.", "I use a serving tray.", "I work with chefs.", "I help hungry people.", "My main job is to serve food."] },
        { name: "Dentist", term: "dentist", clues: ["I work in a clinic.", "I use a small mirror.", "I work with nurses.", "I help with toothaches.", "My main job is to clean teeth."] },
        { name: "Farmer", term: "farmer", clues: ["I work on a farm.", "I use a big tractor.", "I work with farm animals.", "I help feed families.", "My main job is to grow food."] },
        { name: "Hairdresser", term: "hairdresser", clues: ["I work in a salon.", "I use sharp scissors.", "I work with other stylists.", "I help you look good.", "My main job is to cut hair."] },
        { name: "Photographer", term: "photographer", clues: ["I work in a studio.", "I use a camera.", "I work with models.", "I help save memories.", "My main job is to take photos."] },
        { name: "Veterinarian", term: "veterinarian", clues: ["I work in an animal clinic.", "I use animal medicine.", "I work with assistants.", "I help sick pets.", "My main job is to care for animals."] },
        { name: "Baker", term: "baker", clues: ["I work in a bakery.", "I use a big oven.", "I work with shop staff.", "I help hungry people.", "My main job is to bake bread."] },
        { name: "Bus Driver", term: "bus", clues: ["I work on the road.", "I use a big bus.", "I work with passengers.", "I help you travel.", "My main job is to drive the bus."] },
        { name: "Postman", term: "mailman", clues: ["I walk in neighborhoods.", "I use a heavy bag.", "I work at the post office.", "I help you get letters.", "My main job is to deliver mail."] },
        { name: "Artist", term: "painter", clues: ["I work in a studio.", "I use a paintbrush.", "I work with galleries.", "I help people enjoy art.", "My main job is to paint."] },
        { name: "Mechanic", term: "mechanic", clues: ["I work in a garage.", "I use a heavy wrench.", "I work with tools.", "I help people with cars.", "My main job is to fix cars."] },
        { name: "Nurse", term: "nurse", clues: ["I work in a hospital.", "I use a thermometer.", "I work with doctors.", "I help sick patients.", "My main job is to care for you."] },
        { name: "Scientist", term: "scientist", clues: ["I work in a lab.", "I use test tubes.", "I work with researchers.", "I help answer questions.", "My main job is to do experiments."] },
        { name: "Singer", term: "singer", clues: ["I work on a stage.", "I use a microphone.", "I work with a band.", "I help people feel happy.", "My main job is to sing songs."] }
    ];

    let jobIndex = 0;
    let step = -1; 
    const revealOrder = [4, 1, 7, 3, 5, 0, 2, 6, 8];

    function gameLogic() {
        const btn = document.getElementById('action-btn');
        // We use source.unsplash.com as it is the most flexible for keyword-based search
        const imageUrl = `url(https://source.unsplash.com/600x400/?${jobs[jobIndex].term})`;

        if (step === -1) {
            step = 0;
            document.getElementById('clue-text').innerText = jobs[jobIndex].clues[step];
            btn.innerText = "Next Clue";
            document.getElementById('progress').innerText = `Job ${jobIndex + 1} of 20`;
            return;
        }

        if (step < 5) {
            document.getElementById('clue-text').innerText = jobs[jobIndex].clues[step];
            let tile = document.getElementById('t' + revealOrder[step]);
            tile.classList.remove('hidden');
            tile.style.backgroundImage = imageUrl;
            step++;
            if (step === 5) btn.innerText = "Reveal Answer";
        } 
        else if (step === 5) {
            document.querySelectorAll('.tile').forEach(t => {
                t.classList.remove('hidden');
                t.style.backgroundImage = imageUrl;
            });
            document.getElementById('clue-text').innerHTML = `<strong>IT IS A: ${jobs[jobIndex].name}!</strong>`;
            btn.innerText = "Next Job";
            step = 6;
        }
        else {
            document.querySelectorAll('.tile').forEach(t => {
                t.classList.add('hidden');
                t.style.backgroundImage = 'none';
            });
            jobIndex = (jobIndex + 1) % jobs.length;
            step = -1;
            document.getElementById('clue-text').innerText = "Ready for the next mystery?";
            btn.innerText = "Start Next Job";
        }
    }
</script>
</body>
</html>
